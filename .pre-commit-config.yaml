# Install: pip install -e ".[dev]" && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
        exclude: ^runs/
  - repo: local
    hooks:
      - id: nb-clean
        name: Normalize notebooks (strip outputs)
        entry: py -3 scripts/nb_clean.py
        language: system
        files: \.ipynb$
