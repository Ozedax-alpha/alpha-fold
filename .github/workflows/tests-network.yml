# Optional network smoke: run manually or on a schedule (not on every PR).
name: Network smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Small preset pipeline (network)
        env:
          ENTREZ_EMAIL: "alphafold-variant-ci@users.noreply.github.com"
        run: |
          python -m avi init --preset insulin --runs-parent runs_smoke_ci --run
